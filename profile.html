<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codeshelf — Mi Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/shared.css">
  <style>
    body { overflow-y: scroll; }
    .page-wrap { max-width: 560px; margin: 0 auto; padding: 32px 16px 80px; }

    .page-title {
      font-family: var(--pixel);
      font-size: 11px; color: var(--text);
      letter-spacing: 2px; margin-bottom: 28px;
    }

    /* ── Avatar preview ── */
    .avatar-section {
      display: flex; align-items: center;
      gap: 20px; margin-bottom: 32px;
    }
    .avatar-big {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--pixel); font-size: 20px;
      color: var(--accent);
      background: var(--accent2);
      flex-shrink: 0;
      transition: background .2s, border-color .2s, color .2s;
    }
    .avatar-info { }
    .avatar-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .avatar-email { font-size: 10px; color: var(--muted); }

    /* ── Color picker ── */
    .color-grid {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .color-option {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      cursor: pointer;
      transition: border-color .15s, transform .15s;
    }
    .color-option:hover { transform: scale(1.15); }
    .color-option.selected { border-color: #fff; }

    /* ── Form ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-card);
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-title {
      font-family: var(--pixel);
      font-size: 9px; color: var(--muted);
      letter-spacing: 3px; margin-bottom: 20px;
    }
    .field { margin-bottom: 18px; }
    .field:last-child { margin-bottom: 0; }
    .field-label {
      font-size: 9px; color: var(--muted);
      letter-spacing: 2px; margin-bottom: 8px;
      display: block;
    }
    .field-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-btn);
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }
    .field-input:focus { border-color: var(--accent); }
    textarea.field-input {
      resize: vertical;
      min-height: 80px;
      line-height: 1.6;
    }
    .field-hint {
      font-size: 9px; color: var(--muted2);
      margin-top: 6px;
    }

    .save-row {
      display: flex; align-items: center;
      gap: 12px; margin-top: 4px;
    }
    .save-status {
      font-size: 9px; letter-spacing: 2px;
      color: #22e6a0;
      opacity: 0;
      transition: opacity .3s;
    }
    .save-status.visible { opacity: 1; }

    /* ── Danger zone ── */
    .danger-card {
      background: rgba(230,34,34,0.04);
      border: 1px solid rgba(230,34,34,0.2);
      border-radius: var(--r-card);
      padding: 24px;
      margin-bottom: 20px;
    }
    .btn-danger {
      background: none;
      border: 1px solid rgba(230,34,34,.4);
      border-radius: var(--r-btn);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      padding: 10px 20px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-danger:hover { background: rgba(230,34,34,.1); }

    /* ── Stats card ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .stat-item { text-align: center; }
    .stat-val {
      font-family: var(--pixel);
      font-size: 16px; color: var(--accent);
      margin-bottom: 6px;
    }
    .stat-key { font-size: 9px; color: var(--muted); letter-spacing: 2px; }
  </style>
</head>
<body>
  <div id="screen-loading" class="loading-screen">
    <span class="loading-text">CARGANDO...</span>
    <div class="loading-bar"></div>
  </div>

  <div id="screen-app" class="hidden">
    <nav class="navbar">
      <a href="social.html" class="navbar-logo">CODESHELF</a>
      <div class="navbar-links">
        <a href="social.html" class="nav-link">EXPLORAR</a>
        <a href="feed.html"   class="nav-link">MIS FUENTES</a>
        <a href="profile.html" class="nav-link active nav-avatar" id="nav-avatar">?</a>
      </div>
    </nav>

    <div class="page-wrap">
      <p class="page-title">MI PERFIL</p>

      <!-- Avatar preview -->
      <div class="avatar-section">
        <div class="avatar-big" id="avatar-preview">?</div>
        <div class="avatar-info">
          <div class="avatar-name" id="preview-name">—</div>
          <div class="avatar-email" id="preview-email">—</div>
        </div>
      </div>

      <!-- Perfil -->
      <div class="card">
        <p class="card-title">INFORMACIÓN PÚBLICA</p>

        <div class="field">
          <label class="field-label" for="inp-name">NOMBRE DE USUARIO</label>
          <input class="field-input" id="inp-name" type="text"
                 placeholder="Tu nombre visible" maxlength="32">
          <p class="field-hint">Visible en tus fuentes publicadas</p>
        </div>

        <div class="field">
          <label class="field-label" for="inp-bio">BIO</label>
          <textarea class="field-input" id="inp-bio"
                    placeholder="Cuéntanos algo sobre ti..." maxlength="160"></textarea>
          <p class="field-hint">Máximo 160 caracteres</p>
        </div>

        <div class="field">
          <label class="field-label">COLOR DE AVATAR</label>
          <div class="color-grid" id="color-grid"></div>
        </div>

        <div class="save-row">
          <button class="btn" id="btn-save">GUARDAR CAMBIOS</button>
          <span class="save-status" id="save-status">✓ GUARDADO</span>
        </div>
      </div>

      <!-- Estadísticas -->
      <div class="card">
        <p class="card-title">ESTADÍSTICAS</p>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-val" id="stat-proyectos">—</div>
            <div class="stat-key">PROYECTOS</div>
          </div>
          <div class="stat-item">
            <div class="stat-val" id="stat-publicadas">—</div>
            <div class="stat-key">PUBLICADAS</div>
          </div>
          <div class="stat-item">
            <div class="stat-val" id="stat-glifos">—</div>
            <div class="stat-key">GLIFOS TOTALES</div>
          </div>
        </div>
      </div>

      <!-- Cuenta -->
      <div class="card">
        <p class="card-title">CUENTA</p>
        <div class="field">
          <label class="field-label">EMAIL</label>
          <input class="field-input" id="inp-email-ro" type="email" disabled
                 style="opacity:.5;cursor:not-allowed;">
        </div>
        <div class="field" style="margin-bottom:0;">
          <label class="field-label">CONTRASEÑA</label>
          <input class="field-input" id="inp-pass" type="password"
                 placeholder="Nueva contraseña (mín. 6 caracteres)" minlength="6">
          <p class="field-hint">Deja vacío para no cambiarla</p>
        </div>
        <div class="save-row" style="margin-top:16px;">
          <button class="btn" id="btn-save-pass">CAMBIAR CONTRASEÑA</button>
          <span class="save-status" id="pass-status">✓ ACTUALIZADO</span>
        </div>
      </div>

      <!-- Danger zone -->
      <div class="danger-card">
        <p class="card-title" style="color:var(--accent);">SESIÓN</p>
        <button class="btn-danger" id="btn-logout">CERRAR SESIÓN</button>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      auth, db, onAuthStateChanged, signOut
    } from './src/firebase.js';
    import {
      doc, getDoc, setDoc, collection, getDocs, query
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    import {
      updatePassword
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { countGlyphs } from './src/pixelRenderer.js';

    const hide = id => document.getElementById(id).classList.add('hidden');
    const show = id => document.getElementById(id).classList.remove('hidden');

    const COLORS = [
      '#e62222','#e66622','#e6c022','#a0e622',
      '#22e66e','#22cce6','#2256e6','#8822e6',
      '#e622b0','#e62266','#888888','#ffffff',
    ];

    let currentUser = null;
    let selectedColor = COLORS[0];

    // ── Render color picker ───────────────────────
    function renderColorPicker(activeColor) {
      const grid = document.getElementById('color-grid');
      grid.innerHTML = '';
      COLORS.forEach(c => {
        const btn = document.createElement('div');
        btn.className = 'color-option' + (c === activeColor ? ' selected' : '');
        btn.style.background = c;
        btn.title = c;
        btn.onclick = () => {
          selectedColor = c;
          document.querySelectorAll('.color-option').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          updateAvatarPreview();
        };
        grid.appendChild(btn);
      });
    }

    function updateAvatarPreview() {
      const name  = document.getElementById('inp-name').value.trim();
      const initial = (name || currentUser?.email || '?')[0].toUpperCase();
      const el = document.getElementById('avatar-preview');
      el.textContent = initial;
      el.style.background = selectedColor + '22';
      el.style.borderColor = selectedColor;
      el.style.color = selectedColor;
      document.getElementById('preview-name').textContent = name || '—';
      document.getElementById('nav-avatar').textContent = initial;
    }

    document.getElementById('inp-name').oninput = updateAvatarPreview;

    // ── Guardar perfil ────────────────────────────
    document.getElementById('btn-save').onclick = async () => {
      if (!currentUser) return;
      const btn = document.getElementById('btn-save');
      btn.disabled = true;
      btn.textContent = '...';

      const data = {
        displayName:  document.getElementById('inp-name').value.trim(),
        bio:          document.getElementById('inp-bio').value.trim(),
        avatarColor:  selectedColor,
        updatedAt:    new Date(),
      };

      try {
        await setDoc(
          doc(db, 'usuarios', currentUser.uid, 'config', 'perfil'),
          data, { merge: true }
        );
        const st = document.getElementById('save-status');
        st.classList.add('visible');
        setTimeout(() => st.classList.remove('visible'), 2500);
      } catch (err) {
        alert('Error al guardar: ' + err.message);
      }
      btn.disabled = false;
      btn.textContent = 'GUARDAR CAMBIOS';
    };

    // ── Cambiar contraseña ────────────────────────
    document.getElementById('btn-save-pass').onclick = async () => {
      const newPass = document.getElementById('inp-pass').value;
      if (!newPass) return;
      if (newPass.length < 6) { alert('Mínimo 6 caracteres'); return; }
      const btn = document.getElementById('btn-save-pass');
      btn.disabled = true; btn.textContent = '...';
      try {
        await updatePassword(currentUser, newPass);
        document.getElementById('inp-pass').value = '';
        const st = document.getElementById('pass-status');
        st.classList.add('visible');
        setTimeout(() => st.classList.remove('visible'), 2500);
      } catch (err) {
        alert('Error: ' + err.message + '\n\nPuede que necesites volver a iniciar sesión.');
      }
      btn.disabled = false; btn.textContent = 'CAMBIAR CONTRASEÑA';
    };

    // ── Logout ────────────────────────────────────
    document.getElementById('btn-logout').onclick = () =>
      signOut(auth).then(() => window.location.replace('index.html'));

    // ── Auth + carga ──────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      hide('screen-loading');
      if (!user) { window.location.replace('index.html'); return; }
      currentUser = user;
      show('screen-app');

      document.getElementById('inp-email-ro').value = user.email || '';
      document.getElementById('preview-email').textContent = user.email || '';

      // Cargar perfil guardado
      try {
        const snap = await getDoc(doc(db, 'usuarios', user.uid, 'config', 'perfil'));
        if (snap.exists()) {
          const d = snap.data();
          document.getElementById('inp-name').value = d.displayName || '';
          document.getElementById('inp-bio').value  = d.bio || '';
          selectedColor = d.avatarColor || COLORS[0];
        }
      } catch {}

      renderColorPicker(selectedColor);
      updateAvatarPreview();

      // Estadísticas
      try {
        const proySnap = await getDocs(
          collection(db, 'usuarios', user.uid, 'proyectos')
        );
        const proyectos = proySnap.docs.map(d => d.data());
        document.getElementById('stat-proyectos').textContent = proyectos.length;

        let totalGlifos = 0;
        proyectos.forEach(p => { totalGlifos += countGlyphs(p.font); });
        document.getElementById('stat-glifos').textContent = totalGlifos;

        // Posts publicados por este usuario
        const { query: q, collection: col, where, getDocs: gd } =
          await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
        const postsSnap = await gd(q(col(db, 'posts'), where('uid', '==', user.uid)));
        document.getElementById('stat-publicadas').textContent = postsSnap.size;
      } catch {}
    });
  </script>
</body>
</html>
