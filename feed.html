<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codeshelf | Mis Proyectos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/shared.css">
  <style>
    body {
      overflow-y: scroll;
      min-height: 100vh;
      background-image: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(191,69,69,0.05) 0%, transparent 70%);
    }

    /* ── Feed ── */
    .feed-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 28px 16px 80px;
    }

    .feed-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 22px;
    }
    .feed-title {
      font-family: var(--pixel);
      font-size: 10px;
      color: var(--text);
      letter-spacing: 2px;
    }
    .feed-count {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 2px;
    }

    /* ── Nav extra ── */
    .avatar-circle {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1.5px solid var(--accent);
      background: var(--accent2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--pixel);
      font-size: 9px;
      color: var(--accent);
      transition: background .15s;
    }
    .avatar-circle:hover { background: rgba(191,69,69,0.18); }

    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--r-btn);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      padding: 6px 12px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-logout:hover { border-color: var(--accent); color: var(--accent); }

    /* ── New project btn ── */
    .new-project-btn {
      border: 1px dashed var(--border2);
      border-radius: var(--r-card);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      margin-bottom: 18px;
      transition: border-color .18s, background .18s, transform .12s;
      background: none;
      width: 100%;
      text-align: left;
      color: var(--text);
      font-family: var(--mono);
    }
    .new-project-btn:hover {
      border-color: var(--accent);
      background: var(--accent3);
      transform: translateY(-1px);
    }

    .plus-square {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: var(--r-btn);
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 20px;
      flex-shrink: 0;
      color: #fff;
      transition: background .15s;
    }
    .new-project-btn:hover .plus-square { background: var(--accent-h); }

    .new-project-sub {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    /* ── Cards ── */
    #projects-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-card);
      overflow: hidden;
      transition: border-color .18s, transform .15s, box-shadow .18s;
      box-shadow: var(--shadow-card);
    }
    .card:hover {
      border-color: var(--border-accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .card-top-line {
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .card-inner { padding: 18px; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .card-icon {
      width: 38px; height: 38px;
      background: var(--accent2);
      border-radius: 50%;
      border: 1px solid var(--border-accent);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--pixel);
      font-size: 11px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .p-title { font-weight: 700; font-size: 13px; color: var(--text); }
    .p-meta  {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 2px;
      margin-top: 4px;
    }

    .card-preview {
      background: #080610;
      border-radius: var(--r-btn);
      padding: 14px;
      margin-bottom: 14px;
      display: flex;
      gap: 10px;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
    }

    .card-actions { display: flex; gap: 8px; }

    .btn-open {
      flex: 1;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--r-btn);
      padding: 10px;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background .15s, transform .12s;
    }
    .btn-open:hover { background: var(--accent-h); transform: translateY(-1px); }

    .btn-del {
      width: 40px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--r-btn);
      color: var(--muted2);
      cursor: pointer;
      font-size: 18px;
      transition: background .15s, border-color .15s, color .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-del:hover {
      background: rgba(191,69,69,0.08);
      border-color: var(--border-accent);
      color: var(--accent);
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 70px 20px;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 3px;
    }
    .empty-state span {
      display: block;
      font-size: 32px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.72);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      padding: 16px;
      backdrop-filter: blur(8px);
    }
    .modal-overlay.hidden { display: none; }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--r-card);
      padding: 32px 28px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.7);
    }

    .modal-title {
      font-family: var(--pixel);
      font-size: 11px;
      color: var(--accent);
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .modal-subtitle {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      margin-bottom: 24px;
    }

    .modal-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-btn);
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      margin-bottom: 8px;
      transition: border-color .15s, background .15s;
    }
    .modal-input:focus {
      border-color: var(--accent);
      background: var(--surface3);
    }
    .modal-input::placeholder { color: var(--muted); }

    .modal-hint {
      font-size: 9px;
      color: var(--muted2);
      letter-spacing: 1px;
      margin-bottom: 22px;
    }

    .modal-actions { display: flex; gap: 8px; }

    .btn-cancel {
      flex: 1;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--r-btn);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      padding: 11px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-cancel:hover { border-color: var(--border2); color: var(--text); }

    .btn-confirm {
      flex: 2;
      background: var(--accent);
      border: none;
      border-radius: var(--r-btn);
      color: #fff;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 2px;
      padding: 11px;
      cursor: pointer;
      transition: background .15s, transform .12s;
    }
    .btn-confirm:hover { background: var(--accent-h); transform: translateY(-1px); }
    .btn-confirm:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    /* ── Auth form (fallback) ── */
    .auth-screen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .auth-box {
      width: 100%; max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-card);
      padding: 44px 36px 40px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }
    .auth-logo { text-align: center; margin-bottom: 36px; }
    .auth-logo-text {
      font-family: var(--pixel);
      font-size: 16px;
      color: var(--accent);
      line-height: 2;
      letter-spacing: 4px;
    }
    .auth-tagline {
      font-size: 7px;
      letter-spacing: 5px;
      color: var(--muted);
      margin-top: 10px;
    }
    .auth-form { display: flex; flex-direction: column; gap: 10px; }
    .auth-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-btn);
      padding: 13px 15px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }
    .auth-input:focus { border-color: var(--accent); }
    .auth-input::placeholder { color: var(--muted); }
    .btn-auth {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--r-btn);
      padding: 14px;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 2.5px;
      cursor: pointer;
      margin-top: 6px;
      transition: background .15s;
    }
    .btn-auth:hover { background: var(--accent-h); }
    .auth-divider { display: flex; align-items: center; gap: 12px; margin: 22px 0; }
    .auth-divider-line { flex: 1; height: 1px; background: var(--border); }
    .auth-divider-text { font-size: 9px; letter-spacing: 2px; color: var(--muted); }
    .btn-google {
      width: 100%; padding: 13px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--r-btn);
      color: var(--text); font-family: var(--mono);
      font-size: 11px; font-weight: 700; cursor: pointer;
      transition: background .15s;
    }
    .btn-google:hover { background: var(--surface3); }
  </style>
</head>
<body>

  <!-- ── Loading screen ── -->
  <div id="screen-loading" class="loading-screen">
    <span class="loading-text">CARGANDO...</span>
    <div class="loading-bar"></div>
  </div>

  <!-- ── Auth screen ── -->
  <div id="screen-auth" class="auth-screen hidden">
    <div class="auth-box">
      <div class="auth-logo">
        <div class="auth-logo-text">CODE<br>SHELF</div>
        <p class="auth-tagline">PIXEL FONT STUDIO</p>
      </div>
      <form class="auth-form" id="auth-form">
        <input class="auth-input" type="email"    id="auth-email"    placeholder="Email" autocomplete="email" required>
        <input class="auth-input" type="password" id="auth-password" placeholder="Contraseña" autocomplete="current-password" required>
        <button type="submit" class="btn-auth">ENTRAR / REGISTRAR</button>
      </form>
      <div class="auth-divider">
        <div class="auth-divider-line"></div>
        <span class="auth-divider-text">O</span>
        <div class="auth-divider-line"></div>
      </div>
      <button class="btn-google" id="btn-google">🔑&nbsp;&nbsp;Continuar con Google</button>
      <p id="auth-error" style="color:var(--accent);font-size:9px;margin-top:14px;text-align:center;display:none;letter-spacing:1px;"></p>
    </div>
  </div>

  <!-- ── App screen ── -->
  <div id="screen-app" class="hidden">
    <nav class="navbar">
      <span class="navbar-logo" style="cursor:default;">CODESHELF</span>
      <div class="navbar-links">
        <a href="social.html" class="nav-link">EXPLORAR</a>
        <button class="btn-logout" id="btn-logout">SALIR</button>
        <div class="avatar-circle" id="avatar">U</div>
      </div>
    </nav>

    <main class="feed-container">
      <div class="feed-header">
        <span class="feed-title">MIS FUENTES</span>
        <span class="feed-count" id="proj-count"></span>
      </div>

      <button class="new-project-btn" id="btn-new-font">
        <div class="plus-square">+</div>
        <div>
          <p style="font-weight:700;font-size:13px;color:var(--text);">Nueva fuente</p>
          <p class="new-project-sub">Crea un nuevo proyecto de pixel font</p>
        </div>
      </button>

      <div id="projects-list"></div>
    </main>
  </div>

  <!-- ── Modal nuevo proyecto ── -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal-box">
      <p class="modal-title">NUEVA FUENTE</p>
      <p class="modal-subtitle">Ponle un nombre a tu proyecto</p>
      <input class="modal-input" type="text" id="new-font-name"
             placeholder="mi-fuente-pixel" maxlength="40">
      <p class="modal-hint">Solo letras, números y guiones</p>
      <div class="modal-actions">
        <button class="btn-cancel" id="close-modal">CANCELAR</button>
        <button class="btn-confirm" id="confirm-create">CREAR</button>
      </div>
    </div>
  </div>

  <!-- ── Card template ── -->
  <template id="tpl-project">
    <div class="card">
      <div class="card-top-line"></div>
      <div class="card-inner">
        <div class="card-header">
          <div class="card-icon">F</div>
          <div>
            <div class="p-title">Nombre</div>
            <div class="p-meta">8PX · 0 GLIFOS</div>
          </div>
        </div>
        <div class="card-preview p-preview"></div>
        <div class="card-actions">
          <button class="btn-open">ABRIR</button>
          <button class="btn-del">×</button>
        </div>
      </div>
    </div>
  </template>

  <script type="module">
    import {
      auth, provider, db,
      signInWithPopup, signOut, onAuthStateChanged,
      signInWithEmailAndPassword, createUserWithEmailAndPassword,
      doc, setDoc, getDocs, collection, query, orderBy, deleteDoc
    } from './src/firebase.js';
    import { renderFeed, initFeedEvents } from './src/Feed.js';

    const show = id => document.getElementById(id).classList.remove('hidden');
    const hide = id => document.getElementById(id).classList.add('hidden');

    async function cargarProyectos(user) {
      const q   = query(collection(db, 'usuarios', user.uid, 'proyectos'), orderBy('updatedAt', 'desc'));
      const snp = await getDocs(q);
      return snp.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    function makeCallbacks(user) {
      const onOpen = (proyecto) => {
        sessionStorage.setItem('proyectoActivo', JSON.stringify(proyecto));
        window.location.href = 'editor.html';
      };
      const onDelete = async (id) => {
        await deleteDoc(doc(db, 'usuarios', user.uid, 'proyectos', id));
        const p = await cargarProyectos(user);
        renderFeed(p, onOpen, onDelete);
        updateCount(p.length);
      };
      const onCreate = async (nombre, size) => {
        const id   = Date.now().toString();
        const ref  = doc(db, 'usuarios', user.uid, 'proyectos', id);
        await setDoc(ref, { nombre, gridSize: size, font: {}, updatedAt: new Date() });
        const p = await cargarProyectos(user);
        renderFeed(p, onOpen, onDelete);
        updateCount(p.length);
      };
      return { onOpen, onDelete, onCreate };
    }

    function updateCount(n) {
      const el = document.getElementById('proj-count');
      if (el) el.textContent = `${n} PROYECTO${n !== 1 ? 'S' : ''}`;
    }

    onAuthStateChanged(auth, async (user) => {
      hide('screen-loading');
      if (!user) { show('screen-auth'); return; }

      const avatar = document.getElementById('avatar');
      if (avatar && user.email) avatar.textContent = user.email[0].toUpperCase();

      show('screen-app');

      const { onOpen, onDelete, onCreate } = makeCallbacks(user);
      const proyectos = await cargarProyectos(user);
      renderFeed(proyectos, onOpen, onDelete);
      updateCount(proyectos.length);
      initFeedEvents(onCreate);

      document.getElementById('btn-logout').onclick = () =>
        signOut(auth).then(() => window.location.reload());
    });

    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      const errEl    = document.getElementById('auth-error');
      errEl.style.display = 'none';
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch {
        try { await createUserWithEmailAndPassword(auth, email, password); }
        catch (err) { errEl.textContent = err.message; errEl.style.display = 'block'; }
      }
    });

    document.getElementById('btn-google').onclick = () =>
      signInWithPopup(auth, provider).catch(err => {
        const errEl = document.getElementById('auth-error');
        errEl.textContent = err.message; errEl.style.display = 'block';
      });
  </script>
</body>
</html>
