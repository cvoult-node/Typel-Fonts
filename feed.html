<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codeshelf | Mis Proyectos</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #080b14;
            --surface: #111420;
            --accent: #e62222; /* Rojo sólido */
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-muted: #888;
            --radius-btn: 6px;
            --radius-card: 14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            overflow-y: scroll;
        }

        /* Navbar fija */
        .navbar {
            height: 52px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(8, 11, 20, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Press Start 2P', cursive;
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 2px;
        }

        .avatar-circle {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: rgba(230, 34, 34, 0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', cursive;
            font-size: 9px;
            color: var(--accent);
        }

        /* Contenedor del Feed */
        .feed-container {
            max-width: 620px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        /* Botón de Nueva Fuente (Dashed) */
        .new-project-btn {
            border: 2px dashed var(--border);
            border-radius: var(--radius-card);
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.15s ease;
        }

        .new-project-btn:hover {
            border-color: var(--accent);
            background: rgba(230, 34, 34, 0.03);
        }

        .plus-square {
            width: 38px;
            height: 38px;
            background: var(--accent);
            border-radius: var(--radius-btn);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }

        /* Lista de Tarjetas */
        #projects-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Estilo de la Tarjeta */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            overflow: hidden;
        }

        .card-top-line {
            height: 3px;
            background: var(--accent);
        }

        .card-inner {
            padding: 18px;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .card-icon {
            width: 38px;
            height: 38px;
            background: rgba(230, 34, 34, 0.12);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', cursive;
            font-size: 11px;
            color: var(--accent);
        }

        .card-title { font-weight: 700; font-size: 13px; }
        .card-meta { font-size: 9px; color: var(--text-muted); letter-spacing: 2px; margin-top: 2px; }

        /* Preview area */
        .card-preview {
            background: #0d0d0d;
            border-radius: var(--radius-btn);
            padding: 12px;
            margin-bottom: 14px;
            display: flex;
            gap: 6px;
            min-height: 44px;
            align-items: center;
            justify-content: center;
        }

        /* Botones */
        .card-actions { display: flex; gap: 8px; }
        
        .btn-open {
            flex: 1;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-btn);
            padding: 10px;
            font-family: inherit;
            font-weight: 700;
            font-size: 10px;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .btn-delete {
            width: 40px;
            background: rgba(230, 34, 34, 0.06);
            border: 1px solid rgba(230, 34, 34, 0.18);
            border-radius: var(--radius-btn);
            color: var(--accent);
            cursor: pointer;
            font-weight: bold;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <nav class="navbar">
        <span class="logo">CODESHELF</span>
        <div class="nav-right">
            <button class="avatar-circle" id="user-menu-btn">U</button>
        </div>
    </nav>

    <main class="feed-container">
        <div class="new-project-btn" id="open-create-modal">
            <div class="plus-square">+</div>
            <div>
                <p style="font-weight:700; font-size:13px;">Nueva fuente</p>
                <p style="font-size:10px; color:var(--text-muted); margin-top:2px;">Crea un nuevo proyecto de pixel font</p>
            </div>
        </div>

        <div id="projects-list">
            </div>
    </main>

    <template id="project-template">
        <div class="card">
            <div class="card-top-line"></div>
            <div class="card-inner">
                <div class="card-header">
                    <div class="card-icon">F</div>
                    <div>
                        <div class="card-title">Nombre del Proyecto</div>
                        <div class="card-meta">16PX · 0 GLIFOS</div>
                    </div>
                </div>

                <div class="card-preview">
                    </div>

                <div class="card-actions">
                    <button class="btn-open">ABRIR</button>
                    <button class="btn-delete">×</button>
                </div>
            </div>
        </div>
    </template>

    <script type="module" src="src/App.js"></script>
</body>
</html>
