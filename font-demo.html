<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="CodeShelf — Demo de Fuente">
  <meta property="og:description" content="Previsualiza fuentes pixel art en CodeShelf">
  <meta property="og:image" content="https://tu-dominio.com/og-preview.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <title>Codeshelf — Demo de Fuente</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/shared.css">
  <style>
    body { overflow-y: scroll; }
    .page-wrap { max-width: 820px; margin: 0 auto; padding: 32px 16px 80px; }

    .back-row { margin-bottom: 20px; }
    .btn-back {
      background: none; border: none; color: var(--muted); font-family: var(--mono);
      font-size: 10px; letter-spacing: 2px; cursor: pointer; padding: 0;
      transition: color .15s; display: flex; align-items: center; gap: 8px;
    }
    .btn-back img { width: 12px; height: 12px; filter: var(--icon-filter); opacity: .5; transform: rotate(180deg); }
    .btn-back:hover { color: var(--text); }
    .btn-back:hover img { opacity: .8; }

    .hero {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-card); overflow: hidden; margin-bottom: 28px;
      box-shadow: var(--shadow-card);
    }
    .hero-accent { height: 4px; background: var(--accent); }
    .hero-inner  { padding: 28px 28px 24px; }
    .hero-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .hero-author { display: flex; align-items: center; gap: 12px; }
    .hero-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--pixel); font-size: 13px; border: 2px solid var(--accent); flex-shrink: 0;
    }
    .hero-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .hero-meta { font-size: 9px; color: var(--muted); letter-spacing: 2px; }
    .hero-badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge { font-size: 8px; letter-spacing: 2px; border: 1px solid var(--border2); border-radius: 4px; padding: 5px 10px; color: var(--muted); }
    .badge.accent { border-color: rgba(191,69,69,.35); color: var(--accent); }

    .preview-section { background: var(--canvas-bg); border-radius: 10px; padding: 20px; margin-bottom: 20px; }
    .preview-label { font-size: 9px; color: var(--muted); letter-spacing: 3px; margin-bottom: 12px; }
    .preview-canvas-wrap { min-height: 80px; display: flex; align-items: center; overflow-x: auto; overflow-y: hidden; margin-bottom: 16px; }
    #preview-canvas { image-rendering: pixelated; }
    .preview-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .preview-input {
      flex: 1; min-width: 160px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r-btn); padding: 10px 14px; color: var(--text);
      font-family: var(--mono); font-size: 12px; outline: none; transition: border-color .15s;
    }
    .preview-input:focus { border-color: var(--accent); }
    .size-btns { display: flex; gap: 4px; }
    .size-btn {
      width: 32px; height: 32px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r-btn); color: var(--muted); font-family: var(--mono);
      font-size: 10px; cursor: pointer; transition: border-color .15s, color .15s;
    }
    .size-btn:hover, .size-btn.active { border-color: var(--accent); color: var(--accent); }
    .color-btns { display: flex; gap: 4px; }
    .color-btn { width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: border-color .15s; }
    .color-btn.active { border-color: rgba(0,0,0,0.4); }
    .dark .color-btn.active { border-color: rgba(255,255,255,0.7); }

    .section-title { font-family: var(--pixel); font-size: 9px; color: var(--muted); letter-spacing: 3px; margin-bottom: 16px; }

    .glyphs-section {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-card);
      padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow-card);
    }
    .glyphs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(52px, 1fr)); gap: 12px; }
    .glyph-cell {
      background: var(--canvas-bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 8px 6px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer; transition: border-color .15s;
    }
    .glyph-cell:hover { border-color: var(--border-accent); }
    .glyph-char { font-size: 9px; color: var(--muted); font-family: var(--mono); letter-spacing: 1px; }

    .info-section {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-card);
      padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow-card);
    }
    .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-top: 16px; }
    .info-key { font-size: 8px; color: var(--muted); letter-spacing: 3px; margin-bottom: 6px; }
    .info-val { font-size: 13px; font-weight: 700; }

    .pangram-section {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-card);
      padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow-card);
    }
    .pangram-canvas-wrap { background: var(--canvas-bg); border-radius: 8px; padding: 16px; overflow-x: auto; margin-top: 16px; }
    #pangram-canvas { image-rendering: pixelated; }
  </style>
</head>
<body>

  <div id="screen-loading" class="loading-screen">
    <span class="loading-text">CARGANDO...</span>
    <div class="loading-bar"></div>
  </div>

  <div id="screen-app" class="hidden">
    <nav class="navbar">
      <a href="social.html" class="navbar-logo">CODESHELF</a>
      <div class="navbar-links">
        <a href="social.html" class="nav-link">EXPLORAR</a>
        <a href="feed.html"   class="nav-link">MIS FUENTES</a>
        <div class="nav-avatar-wrap">
          <div class="nav-avatar" id="nav-avatar" tabindex="0" role="button" aria-label="Menú de usuario">?</div>
          <div class="nav-dropdown" id="nav-dropdown">
            <div class="dd-user">
              <div class="dd-avatar-sm" id="dd-avatar-sm">?</div>
              <div>
                <div class="dd-user-name"  id="dd-user-name">—</div>
                <div class="dd-user-email" id="dd-user-email">—</div>
              </div>
            </div>
            <div class="dd-section">
              <div class="dd-label">NAVEGAR</div>
              <a href="social.html" class="dd-item"><img class="dd-icon" src="src/icons/explore.svg" alt="">Explorar fuentes</a>
              <a href="feed.html"   class="dd-item"><img class="dd-icon" src="src/icons/fonts.svg"   alt="">Mis fuentes</a>
            </div>
            <div class="dd-section">
              <div class="dd-label">CUENTA</div>
              <a href="profile.html" class="dd-item"><img class="dd-icon" src="src/icons/user.svg"    alt="">Mi perfil</a>
              <button class="dd-item" id="dd-theme">
                <img class="dd-icon" src="src/icons/theme.svg" alt=""><span id="dd-theme-label">Tema oscuro</span>
              </button>
              <button class="dd-item danger" id="dd-logout">
                <img class="dd-icon" src="src/icons/logout.svg" alt="">Cerrar sesión
              </button>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <div class="page-wrap">
      <div class="back-row">
        <button class="btn-back" onclick="history.back()">
          <img src="src/icons/arrow-right.svg" alt="">VOLVER
        </button>
      </div>

      <div class="hero">
        <div class="hero-accent"></div>
        <div class="hero-inner">
          <div class="hero-top">
            <div class="hero-author">
              <div class="hero-avatar" id="hero-avatar">?</div>
              <div>
                <div class="hero-name" id="hero-name">—</div>
                <div class="hero-meta" id="hero-meta">—</div>
              </div>
            </div>
            <div class="hero-badges" id="hero-badges"></div>
          </div>

          <div class="preview-section">
            <p class="preview-label">PREVISUALIZACIÓN INTERACTIVA</p>
            <div class="preview-canvas-wrap">
              <canvas id="preview-canvas"></canvas>
            </div>
            <div class="preview-controls">
              <input class="preview-input" id="preview-text" type="text"
                     placeholder="Escribe aquí..." maxlength="60" value="HELLO WORLD">
              <div class="size-btns">
                <button class="size-btn" data-size="3">S</button>
                <button class="size-btn active" data-size="4">M</button>
                <button class="size-btn" data-size="6">L</button>
              </div>
              <div class="color-btns">
                <div class="color-btn active" data-color="#bf4545" style="background:#bf4545"></div>
                <div class="color-btn"        data-color="#4575bf" style="background:#4575bf"></div>
                <div class="color-btn"        data-color="#45bf78" style="background:#45bf78"></div>
                <div class="color-btn"        data-color="#bfb045" style="background:#bfb045"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="info-section">
        <div class="section-title">INFORMACIÓN</div>
        <div class="info-grid" id="info-grid"></div>
      </div>

      <div class="glyphs-section">
        <div class="section-title">TODOS LOS GLIFOS</div>
        <div class="glyphs-grid" id="glyphs-grid"></div>
      </div>

      <div class="pangram-section">
        <div class="section-title">PANGRAMA</div>
        <div class="pangram-canvas-wrap">
          <canvas id="pangram-canvas"></canvas>
        </div>
      </div>
    </div>
  </div>

    <script src="src/env.js"></script>
  <script type="module">
    import { auth, db, onAuthStateChanged, signOut } from './src/firebase.js';
    import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    import { renderTextOnCanvas, createGlyphGrid, countGlyphs, measureText } from './src/pixelRenderer.js';

    const hide = id => document.getElementById(id).classList.add('hidden');
    const show = id => document.getElementById(id).classList.remove('hidden');

    // ── Theme ──────────────────────────────────
    function getTheme() { return localStorage.getItem('cs-theme') || 'light'; }
    function applyTheme(t) {
      document.documentElement.className = t;
      localStorage.setItem('cs-theme', t);
      const lbl = document.getElementById('dd-theme-label');
      if (lbl) lbl.textContent = t === 'dark' ? 'Tema claro' : 'Tema oscuro';
    }
    applyTheme(getTheme());
    document.getElementById('dd-theme').onclick = () => {
      applyTheme(document.documentElement.className === 'dark' ? 'light' : 'dark');
      closeDropdown();
    };
    document.getElementById('dd-logout').onclick = () =>
      signOut(auth).then(() => window.location.replace('index.html'));

    // ── Dropdown ───────────────────────────────
    const avatarBtn = document.getElementById('nav-avatar');
    const dropdown  = document.getElementById('nav-dropdown');
    const openDropdown  = () => { dropdown.classList.add('open'); avatarBtn.classList.add('open'); };
    const closeDropdown = () => { dropdown.classList.remove('open'); avatarBtn.classList.remove('open'); };
    avatarBtn.onclick = e => { e.stopPropagation(); dropdown.classList.contains('open') ? closeDropdown() : openDropdown(); };
    document.addEventListener('click',   e => { if (!dropdown.contains(e.target) && e.target !== avatarBtn) closeDropdown(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDropdown(); });

    // ── Helpers ────────────────────────────────
    const AVATAR_COLORS = ['#bf4545','#4575bf','#45bf78','#bf9045','#8045bf','#45b8bf'];
    function avatarColor(str) {
      let h = 0;
      for (const c of (str||'?')) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
      return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
    }
    function formatDate(ts) {
      if (!ts) return '—';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('es-ES', { day:'numeric', month:'long', year:'numeric' });
    }

    let post = null, pixelSize = 4, fontColor = '#bf4545';

    function drawPreview() {
      if (!post) return;
      const text = document.getElementById('preview-text').value || ' ';
      const canvas = document.getElementById('preview-canvas');
      const gs = post.gridSize || 8, ls = 2, padX = 16, padY = 12;
      canvas.width  = Math.max(measureText(text.toUpperCase(), gs, pixelSize, ls) + padX * 2, 10);
      canvas.height = Math.max(gs * pixelSize + padY * 2, 10);
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      renderTextOnCanvas(ctx, text, post.font || {}, gs, pixelSize, padX, padY, fontColor, ls);
    }

    function drawPangram() {
      if (!post) return;
      const text = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ 0123456789';
      const gs = post.gridSize || 8, ps = 3, ls = 2, chars = 13;
      const lineH = gs * ps + 8;
      const lines = [];
      for (let i = 0; i < text.length; i += chars) lines.push(text.slice(i, i + chars));
      const w = measureText(text.slice(0, chars), gs, ps, ls) + 32;
      const h = lines.length * lineH + 24;
      const canvas = document.getElementById('pangram-canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, w, h);
      lines.forEach((line, i) => renderTextOnCanvas(ctx, line, post.font || {}, gs, ps, 16, 12 + i * lineH, fontColor, ls));
    }

    function renderGlyphs() {
      if (!post) return;
      const grid = document.getElementById('glyphs-grid');
      grid.innerHTML = '';
      const font = post.font || {}, gs = post.gridSize || 8;
      const order = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 .,:;!?-_/\\@#$%&()[]{}';
      [...new Set([...order, ...Object.keys(font)])].forEach(ch => {
        const glyph = font[ch];
        if (!glyph || !glyph.some(Boolean)) return;
        const cell = document.createElement('div');
        cell.className = 'glyph-cell'; cell.title = `"${ch}"`;
        cell.appendChild(createGlyphGrid(glyph, gs, 3, fontColor));
        const label = document.createElement('span');
        label.className = 'glyph-char'; label.textContent = ch === ' ' ? '[ ]' : ch;
        cell.appendChild(label);
        cell.onclick = () => { document.getElementById('preview-text').value += ch; drawPreview(); };
        grid.appendChild(cell);
      });
    }

    function initPost(p) {
      post = p;
      const gs = p.gridSize || 8, glyphCount = countGlyphs(p.font);
      const initial = (p.autorNombre || p.autorEmail || '?')[0].toUpperCase();
      const bgCol   = avatarColor(p.uid);
      const avatarEl = document.getElementById('hero-avatar');
      avatarEl.textContent = initial;
      avatarEl.style.background   = bgCol + '22';
      avatarEl.style.borderColor  = bgCol;
      avatarEl.style.color        = bgCol;
      document.getElementById('hero-name').textContent = p.autorNombre || p.autorEmail || 'Anónimo';
      document.getElementById('hero-meta').textContent = formatDate(p.publishedAt);
      document.title = `${p.fontNombre || 'Fuente'} — Codeshelf`;
      document.getElementById('hero-badges').innerHTML = `
        <span class="badge accent">${gs}PX</span>
        <span class="badge">${glyphCount} GLIFOS</span>
        <span class="badge">${p.fontNombre || 'Sin nombre'}</span>`;
      document.getElementById('info-grid').innerHTML = `
        <div><div class="info-key">NOMBRE</div><div class="info-val">${p.fontNombre || '—'}</div></div>
        <div><div class="info-key">AUTOR</div><div class="info-val">${p.autorNombre || p.autorEmail || 'Anónimo'}</div></div>
        <div><div class="info-key">REJILLA</div><div class="info-val">${gs} × ${gs} PX</div></div>
        <div><div class="info-key">GLIFOS</div><div class="info-val">${glyphCount}</div></div>
        <div><div class="info-key">PUBLICADO</div><div class="info-val">${formatDate(p.publishedAt)}</div></div>
        <div><div class="info-key">BIO</div><div class="info-val" style="font-size:11px;font-weight:400;color:var(--muted);">${p.autorBio || '—'}</div></div>`;
      drawPreview(); drawPangram(); renderGlyphs();
    }

    document.getElementById('preview-text').oninput = drawPreview;
    document.querySelectorAll('.size-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); pixelSize = parseInt(btn.dataset.size);
        drawPreview(); drawPangram();
      };
    });
    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); fontColor = btn.dataset.color;
        drawPreview(); drawPangram(); renderGlyphs();
      };
    });

    onAuthStateChanged(auth, async (user) => {
      hide('screen-loading');
      if (!user) { window.location.replace('index.html'); return; }
      if (user) {
        try {
          const perfil = await getDoc(doc(db, 'usuarios', user.uid, 'config', 'perfil'));
          const d = perfil.exists() ? perfil.data() : {};
          const nombre = d.displayName || user.email || '?';
          document.getElementById('nav-avatar').textContent   = nombre[0].toUpperCase();
          document.getElementById('dd-avatar-sm').textContent = nombre[0].toUpperCase();
          document.getElementById('dd-user-name').textContent  = nombre;
          document.getElementById('dd-user-email').textContent = user.email || '';
          if (d.avatarColor) {
            const av = document.getElementById('nav-avatar');
            av.style.borderColor = d.avatarColor; av.style.color = d.avatarColor; av.style.background = d.avatarColor + '20';
          }
        } catch { document.getElementById('nav-avatar').textContent = (user.email||'?')[0].toUpperCase(); }
      }
      const raw = sessionStorage.getItem('demoPost');
      if (!raw) { window.location.replace('social.html'); return; }
      try { const p = JSON.parse(raw); show('screen-app'); initPost(p); }
      catch { window.location.replace('social.html'); }
    });
  </script>
</body>
</html>
