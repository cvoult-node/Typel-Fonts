<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="CodeShelf — Explorar Fuentes">
  <meta property="og:description" content="Descubre y explora fuentes pixel art creadas por la comunidad">
  <meta property="og:image" content="https://tu-dominio.com/og-preview.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <title>Codeshelf — Explorar Fuentes</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/shared.css">
  <style>
    body {
      overflow-y: scroll;
      background-image: radial-gradient(ellipse 70% 40% at 50% 0%, rgba(191,69,69,0.04) 0%, transparent 60%);
    }
    .feed-wrap { max-width: 680px; margin: 0 auto; padding: 28px 16px 64px; }
    .feed-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px; }
    .feed-title { font-family: var(--pixel); font-size: 10px; color: var(--text); letter-spacing: 2px; }
    .feed-count { font-size: 9px; color: var(--muted); letter-spacing: 2px; }

    /* ── Post card ── */
    .post-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-card); overflow: hidden; margin-bottom: 16px;
      transition: border-color .18s, transform .15s, box-shadow .18s;
      cursor: pointer; box-shadow: var(--shadow-card);
    }
    .post-card:hover { border-color: var(--border-accent); transform: translateY(-2px); box-shadow: var(--shadow-hover); }
    .card-accent-line { height: 2px; background: linear-gradient(90deg, var(--accent), transparent); }
    .card-body { padding: 20px; }
    .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .card-author { display: flex; align-items: center; gap: 12px; }
    .author-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--pixel); font-size: 8px; border: 1.5px solid; flex-shrink: 0;
    }
    .author-name { font-size: 12px; font-weight: 700; color: var(--text); }
    .author-date { font-size: 9px; color: var(--muted); margin-top: 2px; letter-spacing: 1px; }
    .card-badge {
      font-size: 8px; letter-spacing: 2px; color: var(--accent);
      border: 1px solid var(--border-accent); border-radius: 5px;
      padding: 4px 8px; background: var(--accent2);
    }
    .card-preview {
      background: var(--canvas-bg); border-radius: 8px; border: 1px solid var(--border);
      padding: 16px; margin-bottom: 16px; min-height: 64px;
      display: flex; align-items: center; overflow: hidden;
    }
    .card-preview canvas { image-rendering: pixelated; max-width: 100%; }
    .card-meta-row { display: flex; align-items: center; justify-content: space-between; }
    .font-name { font-family: var(--pixel); font-size: 10px; color: var(--text); letter-spacing: 1px; }
    .font-stats { font-size: 9px; color: var(--muted); letter-spacing: 2px; }
    .card-glyphs-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .btn-demo {
      display: block; width: 100%; margin-top: 16px; padding: 10px;
      background: none; border: 1px solid var(--border); border-radius: var(--r-btn);
      color: var(--muted); font-family: var(--mono); font-size: 9px;
      letter-spacing: 2px; cursor: pointer;
      transition: border-color .15s, color .15s, background .15s; text-align: center;
    }
    .btn-demo:hover { border-color: var(--accent); color: var(--accent); background: var(--accent3); }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty-icon { width: 40px; height: 40px; margin: 0 auto 18px; opacity: .2; filter: var(--icon-filter); }
    .empty-title { font-family: var(--pixel); font-size: 10px; letter-spacing: 3px; margin-bottom: 10px; }
    .empty-sub { font-size: 10px; color: var(--muted2); }
  </style>
</head>
<body>

  <div id="screen-loading" class="loading-screen">
    <span class="loading-text">CARGANDO...</span>
    <div class="loading-bar"></div>
  </div>

  <div id="screen-app" class="hidden" style="min-height:100vh;">
    <nav class="navbar">
      <a href="social.html" class="navbar-logo">CODESHELF</a>
      <div class="navbar-links">
        <a href="social.html" class="nav-link active">EXPLORAR</a>
        <a href="feed.html"   class="nav-link" id="nav-feed">MIS FUENTES</a>
        <div class="nav-avatar-wrap">
          <div class="nav-avatar" id="nav-avatar" tabindex="0" role="button" aria-label="Menú de usuario">?</div>
          <div class="nav-dropdown" id="nav-dropdown">
            <div class="dd-user">
              <div class="dd-avatar-sm" id="dd-avatar-sm">?</div>
              <div>
                <div class="dd-user-name"  id="dd-user-name">—</div>
                <div class="dd-user-email" id="dd-user-email">—</div>
              </div>
            </div>
            <div class="dd-section">
              <div class="dd-label">NAVEGAR</div>
              <a href="social.html" class="dd-item">
                <img class="dd-icon" src="src/icons/explore.svg" alt="">Explorar fuentes
              </a>
              <a href="feed.html" class="dd-item">
                <img class="dd-icon" src="src/icons/fonts.svg" alt="">Mis fuentes
              </a>
            </div>
            <div class="dd-section">
              <div class="dd-label">CUENTA</div>
              <a href="profile.html" class="dd-item">
                <img class="dd-icon" src="src/icons/user.svg" alt="">Mi perfil
              </a>
              <button class="dd-item" id="dd-theme">
                <img class="dd-icon" src="src/icons/theme.svg" id="dd-theme-icon" alt="">
                <span id="dd-theme-label">Tema oscuro</span>
              </button>
              <button class="dd-item danger" id="dd-logout">
                <img class="dd-icon" src="src/icons/logout.svg" alt="">Cerrar sesión
              </button>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <main class="feed-wrap">
      <div class="feed-header">
        <span class="feed-title">FUENTES PUBLICADAS</span>
        <span class="feed-count" id="post-count"></span>
      </div>
      <div id="posts-list"></div>
    </main>
  </div>

    <script src="src/env.js"></script>
  <script type="module">
    import { auth, db, onAuthStateChanged, signOut } from './src/firebase.js';
    import {
      collection, query, orderBy, limit, getDocs, doc, getDoc
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    import { createTextCanvas, createGlyphGrid, countGlyphs, availableChars } from './src/pixelRenderer.js';

    const hide = id => document.getElementById(id).classList.add('hidden');
    const show = id => document.getElementById(id).classList.remove('hidden');

    // ── Theme ──────────────────────────────────
    function getTheme() { return localStorage.getItem('cs-theme') || 'light'; }
    function applyTheme(t) {
      document.documentElement.className = t;
      localStorage.setItem('cs-theme', t);
      const lbl = document.getElementById('dd-theme-label');
      if (lbl) lbl.textContent = t === 'dark' ? 'Tema claro' : 'Tema oscuro';
    }
    applyTheme(getTheme());
    document.getElementById('dd-theme').onclick = () => {
      applyTheme(document.documentElement.className === 'dark' ? 'light' : 'dark');
      closeDropdown();
    };
    document.getElementById('dd-logout').onclick = () =>
      signOut(auth).then(() => window.location.replace('index.html'));

    // ── Dropdown ───────────────────────────────
    const avatarBtn = document.getElementById('nav-avatar');
    const dropdown  = document.getElementById('nav-dropdown');
    const openDropdown  = () => { dropdown.classList.add('open'); avatarBtn.classList.add('open'); };
    const closeDropdown = () => { dropdown.classList.remove('open'); avatarBtn.classList.remove('open'); };
    avatarBtn.onclick = e => { e.stopPropagation(); dropdown.classList.contains('open') ? closeDropdown() : openDropdown(); };
    document.addEventListener('click',   e => { if (!dropdown.contains(e.target) && e.target !== avatarBtn) closeDropdown(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDropdown(); });

    // ── Helpers ────────────────────────────────
    const AVATAR_COLORS = ['#bf4545','#4575bf','#45bf78','#bf9045','#8045bf','#45b8bf'];
    function avatarColor(str) {
      let h = 0;
      for (const c of (str||'?')) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
      return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
    }
    function formatDate(ts) {
      if (!ts) return '';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('es-ES', { day:'numeric', month:'short', year:'numeric' });
    }

    async function loadPosts() {
      const q   = query(collection(db, 'posts'), orderBy('publishedAt', 'desc'), limit(40));
      const snp = await getDocs(q);
      return snp.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    function renderPosts(posts) {
      const list = document.getElementById('posts-list');
      list.innerHTML = '';
      document.getElementById('post-count').textContent =
        `${posts.length} FUENTE${posts.length !== 1 ? 'S' : ''}`;

      if (!posts.length) {
        list.innerHTML = `
          <div class="empty">
            <img class="empty-icon" src="src/icons/pencil.svg" alt="">
            <div class="empty-title">SIN PUBLICACIONES AÚN</div>
            <p class="empty-sub">Sé el primero en publicar tu fuente pixel</p>
          </div>`;
        return;
      }

      posts.forEach(post => {
        const card = document.createElement('div');
        card.className = 'post-card';
        const glyphCount = countGlyphs(post.font);
        const chars      = availableChars(post.font);
        const initial    = (post.autorNombre || post.autorEmail || '?')[0].toUpperCase();
        const bgCol      = avatarColor(post.uid);

        const canvas = createTextCanvas(post.previewText || 'HELLO', post.font || {}, post.gridSize || 8, {
          pixelSize: 4, color: '#bf4545', letterSpacing: 2, paddingX: 16, paddingY: 12
        });

        card.innerHTML = `
          <div class="card-accent-line"></div>
          <div class="card-body">
            <div class="card-top">
              <div class="card-author">
                <div class="author-avatar"
                     style="background:${bgCol}18;border-color:${bgCol}80;color:${bgCol};">
                  ${initial}
                </div>
                <div>
                  <div class="author-name">${post.autorNombre || post.autorEmail || 'Anónimo'}</div>
                  <div class="author-date">${formatDate(post.publishedAt)}</div>
                </div>
              </div>
              <div class="card-badge">${post.gridSize || 8}PX</div>
            </div>
            <div class="card-preview" id="preview-${post.id}"></div>
            <div class="card-meta-row">
              <span class="font-name">${post.fontNombre || 'Sin nombre'}</span>
              <span class="font-stats">${glyphCount} GLIFOS</span>
            </div>
            <div class="card-glyphs-row" id="glyphs-${post.id}"></div>
            <button class="btn-demo">VER DEMOSTRACIÓN COMPLETA</button>
          </div>`;

        card.querySelector(`#preview-${post.id}`).appendChild(canvas);
        const glyphsRow = card.querySelector(`#glyphs-${post.id}`);
        chars.slice(0, 20).forEach(ch => {
          const g = createGlyphGrid(post.font[ch], post.gridSize || 8, 2, '#bf4545');
          const wrap  = document.createElement('div');
          wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:3px;';
          const label = document.createElement('span');
          label.textContent = ch;
          label.style.cssText = 'font-size:8px;color:var(--muted);font-family:var(--mono);';
          wrap.appendChild(g); wrap.appendChild(label);
          glyphsRow.appendChild(wrap);
        });

        const toDemo = () => { sessionStorage.setItem('demoPost', JSON.stringify(post)); window.location.href = 'font-demo.html'; };
        card.querySelector('.btn-demo').onclick = e => { e.stopPropagation(); toDemo(); };
        card.onclick = toDemo;
        list.appendChild(card);
      });
    }

    onAuthStateChanged(auth, async (user) => {
      hide('screen-loading');
      show('screen-app');

      if (user) {
        try {
          const perfil = await getDoc(doc(db, 'usuarios', user.uid, 'config', 'perfil'));
          const d = perfil.exists() ? perfil.data() : {};
          const nombre = d.displayName || user.email || '?';
          const ini = nombre[0].toUpperCase();
          document.getElementById('nav-avatar').textContent   = ini;
          document.getElementById('dd-avatar-sm').textContent = ini;
          document.getElementById('dd-user-name').textContent  = nombre;
          document.getElementById('dd-user-email').textContent = user.email || '';
          if (d.avatarColor) {
            const av = document.getElementById('nav-avatar');
            av.style.borderColor = d.avatarColor; av.style.color = d.avatarColor; av.style.background = d.avatarColor + '20';
          }
        } catch {
          const ini = (user.email || '?')[0].toUpperCase();
          document.getElementById('nav-avatar').textContent = ini;
          document.getElementById('dd-user-email').textContent = user.email || '';
        }
      } else {
        // Guest: hide logout, show login link
        const logout = document.getElementById('dd-logout');
        if (logout) logout.style.display = 'none';
      }

      const posts = await loadPosts();
      renderPosts(posts);
    });
  </script>
</body>
</html>
