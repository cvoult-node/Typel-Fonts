<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codeshelf — Explorar Fuentes</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/shared.css">
  <style>
    body { overflow-y: scroll; }

    .feed-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }

    .feed-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .feed-title {
      font-family: var(--pixel);
      font-size: 11px;
      color: var(--text);
      letter-spacing: 2px;
    }
    .feed-count {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 2px;
    }

    /* ── Post card ── */
    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-card);
      overflow: hidden;
      margin-bottom: 20px;
      transition: border-color .15s, transform .15s;
      cursor: pointer;
    }
    .post-card:hover {
      border-color: rgba(230,34,34,0.35);
      transform: translateY(-1px);
    }
    .card-accent-line { height: 3px; background: var(--accent); }

    .card-body { padding: 18px 20px; }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .card-author {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .author-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--pixel); font-size: 8px;
      border: 1.5px solid var(--accent);
      flex-shrink: 0;
      font-weight: 700;
    }
    .author-name { font-size: 11px; font-weight: 700; }
    .author-date { font-size: 9px; color: var(--muted); margin-top: 2px; letter-spacing: 1px; }

    .card-badge {
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--accent);
      border: 1px solid rgba(230,34,34,0.3);
      border-radius: 4px;
      padding: 4px 8px;
    }

    /* Preview canvas area */
    .card-preview {
      background: #0a0a0f;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 14px;
      min-height: 60px;
      display: flex;
      align-items: center;
      overflow: hidden;
    }
    .card-preview canvas {
      image-rendering: pixelated;
      max-width: 100%;
    }

    .card-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .font-name {
      font-family: var(--pixel);
      font-size: 10px;
      color: var(--text);
      letter-spacing: 1px;
    }
    .font-stats {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 2px;
    }

    .card-glyphs-row {
      display: flex;
      gap: 6px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .btn-demo {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      background: none;
      border: 1px solid var(--border2);
      border-radius: var(--r-btn);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
      text-align: center;
    }
    .btn-demo:hover { border-color: var(--accent); color: var(--accent); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty-icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: .3;
    }
    .empty-title {
      font-family: var(--pixel);
      font-size: 10px;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    .empty-sub { font-size: 10px; color: var(--muted2); }
  </style>
</head>
<body>

  <div id="screen-loading" class="loading-screen">
    <span class="loading-text">CARGANDO...</span>
    <div class="loading-bar"></div>
  </div>

  <div id="screen-app" class="hidden" style="min-height:100vh;">
    <nav class="navbar">
      <a href="social.html" class="navbar-logo">CODESHELF</a>
      <div class="navbar-links">
        <a href="social.html" class="nav-link active">EXPLORAR</a>
        <span class="nav-link" id="nav-proyectos" style="display:none">MIS FUENTES</span>
        <a href="profile.html" class="nav-avatar" id="nav-avatar">?</a>
      </div>
    </nav>

    <main class="feed-wrap">
      <div class="feed-header">
        <span class="feed-title">FUENTES PUBLICADAS</span>
        <span class="feed-count" id="post-count"></span>
      </div>
      <div id="posts-list"></div>
    </main>
  </div>

  <script type="module">
    import { auth, db, onAuthStateChanged } from './src/firebase.js';
    import {
      collection, query, orderBy, limit, getDocs, doc, getDoc
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    import { createTextCanvas, createGlyphGrid, countGlyphs, availableChars } from './src/pixelRenderer.js';

    const hide = id => document.getElementById(id).classList.add('hidden');
    const show = id => document.getElementById(id).classList.remove('hidden');

    // Colores de avatar por inicial
    const AVATAR_COLORS = ['#e62222','#2265e6','#22e662','#e6a022','#a022e6','#22e6cc'];
    function avatarColor(str) {
      let h = 0;
      for (const c of (str||'?')) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
      return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
    }

    function formatDate(ts) {
      if (!ts) return '';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('es-ES', { day:'numeric', month:'short', year:'numeric' });
    }

    async function loadPosts() {
      const q   = query(collection(db, 'posts'), orderBy('publishedAt', 'desc'), limit(40));
      const snp = await getDocs(q);
      return snp.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    function renderPosts(posts, currentUid) {
      const list = document.getElementById('posts-list');
      list.innerHTML = '';
      document.getElementById('post-count').textContent = `${posts.length} FUENTE${posts.length !== 1 ? 'S' : ''}`;

      if (!posts.length) {
        list.innerHTML = `
          <div class="empty">
            <div class="empty-icon">✏️</div>
            <div class="empty-title">SIN PUBLICACIONES AÚN</div>
            <p class="empty-sub">Sé el primero en publicar tu fuente pixel</p>
          </div>`;
        return;
      }

      posts.forEach(post => {
        const card = document.createElement('div');
        card.className = 'post-card';

        const glyphCount = countGlyphs(post.font);
        const chars      = availableChars(post.font);
        const initial    = (post.autorNombre || post.autorEmail || '?')[0].toUpperCase();
        const bgCol      = avatarColor(post.uid);
        const previewStr = post.previewText || 'HELLO';

        // Canvas preview
        const canvas = createTextCanvas(previewStr, post.font || {}, post.gridSize || 8, {
          pixelSize: 4, color: '#e62222', letterSpacing: 2, paddingX: 16, paddingY: 12
        });

        // Glifos disponibles (primeros 20)
        const glyphsHtml = chars.slice(0, 20).map(ch => {
          const g = createGlyphGrid(post.font[ch], post.gridSize || 8, 2);
          const wrap = document.createElement('div');
          wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:3px;';
          const label = document.createElement('span');
          label.textContent = ch;
          label.style.cssText = 'font-size:8px;color:var(--muted);font-family:var(--mono);';
          wrap.appendChild(g);
          wrap.appendChild(label);
          return wrap;
        });

        card.innerHTML = `
          <div class="card-accent-line"></div>
          <div class="card-body">
            <div class="card-top">
              <div class="card-author">
                <div class="author-avatar" style="background:${bgCol}22;border-color:${bgCol};color:${bgCol};">${initial}</div>
                <div>
                  <div class="author-name">${post.autorNombre || post.autorEmail || 'Anónimo'}</div>
                  <div class="author-date">${formatDate(post.publishedAt)}</div>
                </div>
              </div>
              <div class="card-badge">${post.gridSize || 8}PX</div>
            </div>
            <div class="card-preview" id="preview-${post.id}"></div>
            <div class="card-meta-row">
              <span class="font-name">${post.fontNombre || 'Sin nombre'}</span>
              <span class="font-stats">${glyphCount} GLIFOS</span>
            </div>
            <div class="card-glyphs-row" id="glyphs-${post.id}"></div>
            <button class="btn-demo">VER DEMOSTRACIÓN COMPLETA →</button>
          </div>`;

        // Insertar canvas
        card.querySelector(`#preview-${post.id}`).appendChild(canvas);

        // Insertar glifos
        const glyphsRow = card.querySelector(`#glyphs-${post.id}`);
        glyphsHtml.forEach(g => glyphsRow.appendChild(g));

        // Click → página de demo
        card.querySelector('.btn-demo').onclick = (e) => {
          e.stopPropagation();
          sessionStorage.setItem('demoPost', JSON.stringify(post));
          window.location.href = 'font-demo.html';
        };
        card.onclick = () => {
          sessionStorage.setItem('demoPost', JSON.stringify(post));
          window.location.href = 'font-demo.html';
        };

        list.appendChild(card);
      });
    }

    // Auth + carga
    onAuthStateChanged(auth, async (user) => {
      hide('screen-loading');
      show('screen-app');

      // Navbar: mostrar avatar y link a proyectos si está logueado
      if (user) {
        const avatarEl = document.getElementById('nav-avatar');
        const navProyectos = document.getElementById('nav-proyectos');

        // Cargar perfil
        try {
          const perfil = await getDoc(doc(db, 'usuarios', user.uid, 'config', 'perfil'));
          const nombre = perfil.exists() ? perfil.data().displayName : null;
          avatarEl.textContent = (nombre || user.email || '?')[0].toUpperCase();
        } catch { avatarEl.textContent = (user.email || '?')[0].toUpperCase(); }

        navProyectos.style.display = '';
        navProyectos.onclick = () => window.location.href = 'feed.html';
      } else {
        // No logueado: avatar como link al login
        const avatarEl = document.getElementById('nav-avatar');
        avatarEl.href = 'index.html';
        avatarEl.textContent = '?';
      }

      const posts = await loadPosts();
      renderPosts(posts, user?.uid);
    });
  </script>
</body>
</html>
