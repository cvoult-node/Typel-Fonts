<!DOCTYPE html>
<html lang="es" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="src/favicon.svg">
    <title>CodeShelf | Pixel Font Studio</title>
    <meta name="description" content="Diseña, guarda y comparte tus propias tipografías pixel art." />
    <meta name="theme-color" content="#ffffff" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ─── LIGHT THEME (Default) ─── */
      html.light {
        --bg:          #ffffff;
        --bg2:         #f5f5f5;
        --surface:     #ffffff;
        --surface2:    #f0f0f0;
        --border:      #e0e0e0;
        --text:        #1a1a1a;
        --text-muted:  #666666;
        --accent:      #ff0000;
        --pixel:       #ff0000;
        --empty:       #f9f9f9;
        --grid-line:   #eeeeee;
        --nav-bg:      rgba(255, 255, 255, 0.9);
        --card-bg:     #ffffff;
        --scrollbar:   #cccccc;
      }

      /* ─── DARK THEME ─── */
      html.dark {
        --bg:          #0a0a0a;
        --bg2:         #111111;
        --surface:     #161616;
        --surface2:    #222222;
        --border:      #333333;
        --text:        #eeeeee;
        --text-muted:  #888888;
        --accent:      #ff0000;
        --pixel:       #ff0000;
        --empty:       #0d0d0d;
        --grid-line:   #1a1a1a;
        --nav-bg:      rgba(10, 10, 10, 0.9);
        --card-bg:     #161616;
        --scrollbar:   #333333;
      }

      body {
        background-color: var(--bg);
        background-image: radial-gradient(var(--border) 1px, transparent 1px);
        background-size: 24px 24px;
        color: var(--text);
        font-family: 'Space Mono', monospace;
        overflow-x: hidden;
        user-select: none;
        transition: background-color 0.2s, color 0.2s;
      }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

      /* Ajuste de bordes: Menos redondeados, más profesionales */
      button, input, select, .card, .panel, .modal-content {
        border-radius: 4px; 
      }

      /* Animations */
      @keyframes fadeUp   { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
      @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.5} }
      @keyframes spin     { to{transform:rotate(360deg)} }

      .fade-up  { animation: fadeUp .3s ease both; }
      .pulsing  { animation: pulse 2s infinite; }

      /* Helpers */
      button, [role="button"] { 
        cursor: pointer; 
        border: 1px solid var(--border);
        transition: all 0.2s;
      }
      button:hover {
        border-color: var(--accent);
        transform: translateY(-1px);
      }
      
      input { font-family: inherit; }

      /* Pixel canvas container */
      #canvas-wrap { 
        image-rendering: pixelated; 
        background: var(--grid-line);
      }

      /* Estilos para el Feed Social */
      .feed-container {
        display: flex;
        flex-direction: column;
        gap: 16px;
        max-width: 600px;
        margin: 0 auto;
      }
      
      .post-card {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 16px;
      }

      /* Modal de exportación */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      
      .modal-content {
        background: var(--bg);
        border: 2px solid var(--accent);
        padding: 24px;
        width: 100%;
        max-width: 400px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/App.js"></script>
    <noscript>
      <div style="text-align:center;padding:60px;font-family:monospace">
        Necesitas JavaScript para usar CodeShelf.
      </div>
    </noscript>
  </body>
</html>
