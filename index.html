<!DOCTYPE html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="src/favicon.svg">
    <title>CodeShelf | Pixel Font Studio</title>
    <meta name="description" content="Diseña, guarda y comparte tus propias tipografías pixel art." />
    <meta name="theme-color" content="#080b14" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ─── LIGHT THEME ─── */
      html.light {
        --bg:          #f2ede8;
        --bg2:         #e8e2db;
        --surface:     rgba(0,0,0,0.04);
        --surface2:    #ddd7cf;
        --border:      rgba(0,0,0,0.10);
        --text:        #1a1228;
        --text-muted:  #7a748e;
        --pixel:       #5b21b6;
        --pixel2:      #0e7490;
        --empty:       #cec7bb;
        --grid-line:   #b9b2a6;
        --nav-bg:      rgba(242,237,232,0.92);
        --card-bg:     linear-gradient(145deg, #ffffff, #ece6ff);
        --scrollbar:   #b8b0c8;
      }

      /* ─── DARK THEME (default) ─── */
      html.dark {
        --bg:          #080b14;
        --bg2:         #0c1020;
        --surface:     rgba(255,255,255,0.025);
        --surface2:    #111827;
        --border:      rgba(255,255,255,0.07);
        --text:        #e2e0f0;
        --text-muted:  #4a5070;
        --pixel:       #7c3aed;
        --pixel2:      #06b6d4;
        --empty:       #090c18;
        --grid-line:   #1a1f35;
        --nav-bg:      rgba(8,11,20,0.88);
        --card-bg:     linear-gradient(145deg, #0f1523, #131b30);
        --scrollbar:   #2a2050;
      }

      body {
        background-color: var(--bg);
        background-image: radial-gradient(var(--border) 1px, transparent 1px);
        background-size: 22px 22px;
        color: var(--text);
        font-family: 'Space Mono', monospace;
        overflow-x: hidden;
        user-select: none;
        transition: background-color 0.3s, color 0.3s;
      }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 10px; }

      /* Animations */
      @keyframes fadeUp   { from { opacity:0; transform:translateY(18px) } to { opacity:1; transform:translateY(0) } }
      @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.4} }
      @keyframes glow     { 0%,100%{box-shadow:0 0 6px rgba(124,58,237,.35)} 50%{box-shadow:0 0 20px rgba(124,58,237,.7)} }
      @keyframes shimmer  { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
      @keyframes spin     { to{transform:rotate(360deg)} }

      .fade-up  { animation: fadeUp .35s ease both; }
      .pulsing  { animation: pulse 2s infinite; }

      /* Interactive helpers */
      button, [role="button"] { cursor: pointer; }
      input { font-family: inherit; }

      /* Pixel canvas grid container */
      #canvas-wrap { image-rendering: pixelated; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/App.js"></script>
    <noscript>
      <div style="text-align:center;padding:60px;font-family:monospace">
        Necesitas JavaScript para usar CodeShelf.
      </div>
    </noscript>
  </body>
</html>
