<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codeshelf — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#080b14;--surface:#111420;--surface2:#1a1d2e;
      --accent:#e62222;--border:rgba(255,255,255,0.1);
      --text:#fff;--muted:#888;
      --mono:'Space Mono',monospace;--pixel:'Press Start 2P',cursive;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
    .box{width:100%;max-width:380px;background:#0f0f0f;border:1px solid var(--border);border-radius:14px;padding:40px 36px;box-shadow:0 24px 60px rgba(0,0,0,0.6);}
    .logo{text-align:center;margin-bottom:32px;}
    .logo-text{font-family:var(--pixel);font-size:18px;color:var(--accent);line-height:2;letter-spacing:3px;}
    .tagline{font-size:8px;letter-spacing:5px;color:var(--muted);margin-top:8px;}
    .form{display:flex;flex-direction:column;gap:10px;}
    input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px 15px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .15s;}
    input:focus{border-color:var(--accent);}
    .btn-main{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:13px;font-family:var(--mono);font-weight:700;font-size:11px;letter-spacing:2px;cursor:pointer;margin-top:4px;transition:opacity .15s;}
    .btn-main:hover{opacity:.85;}
    .btn-main:disabled{opacity:.5;cursor:not-allowed;}
    .divider{display:flex;align-items:center;gap:10px;margin:18px 0;}
    .divider-line{flex:1;height:1px;background:var(--border);}
    .divider-text{font-size:9px;letter-spacing:2px;color:var(--muted);}
    .btn-google{width:100%;padding:12px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;transition:background .15s;}
    .btn-google:hover{background:rgba(255,255,255,0.1);}
    .error{color:var(--accent);font-size:10px;margin-top:12px;text-align:center;display:none;line-height:1.6;}
    .loading{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
    .loading-text{font-family:var(--pixel);font-size:10px;color:var(--accent);letter-spacing:4px;animation:pulse 1.4s infinite;}
    .loading-bar{width:160px;height:2px;background:var(--accent);border-radius:2px;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .hidden{display:none!important;}
  </style>
</head>
<body>
  <div id="screen-loading" class="loading">
    <span class="loading-text">CARGANDO...</span>
    <div class="loading-bar"></div>
  </div>

  <div id="screen-auth" class="hidden" style="width:100%;display:flex;align-items:center;justify-content:center;">
    <div class="box">
      <div class="logo">
        <div class="logo-text">CODE<br>SHELF</div>
        <p class="tagline">PIXEL FONT STUDIO</p>
      </div>
      <form class="form" id="auth-form">
        <input type="email"    id="inp-email"    placeholder="Email" autocomplete="email" required>
        <input type="password" id="inp-password" placeholder="Contraseña" autocomplete="current-password" required>
        <button type="submit" class="btn-main" id="btn-submit">ENTRAR / REGISTRAR</button>
      </form>
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">O</span>
        <div class="divider-line"></div>
      </div>
      <button class="btn-google" id="btn-google">🔑&nbsp;&nbsp;Continuar con Google</button>
      <p class="error" id="auth-error"></p>
    </div>
  </div>

  <script type="module">
    import { auth, provider, signInWithPopup, onAuthStateChanged,
             signInWithEmailAndPassword, createUserWithEmailAndPassword
           } from './src/firebase.js';

    const hide = id => document.getElementById(id).classList.add('hidden');
    const show = id => document.getElementById(id).classList.remove('hidden');

    onAuthStateChanged(auth, u => {
      hide('screen-loading');
      if (u) { window.location.replace('social.html'); return; }
      show('screen-auth');
    });

    const showError = msg => {
      const el = document.getElementById('auth-error');
      el.textContent = msg; el.style.display = 'block';
    };

    document.getElementById('auth-form').onsubmit = async e => {
      e.preventDefault();
      const email = document.getElementById('inp-email').value.trim();
      const pass  = document.getElementById('inp-password').value;
      const btn   = document.getElementById('btn-submit');
      btn.disabled = true; btn.textContent = '...';
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch {
        try { await createUserWithEmailAndPassword(auth, email, pass); }
        catch (err) { showError(err.message); }
      }
      btn.disabled = false; btn.textContent = 'ENTRAR / REGISTRAR';
    };

    document.getElementById('btn-google').onclick = () =>
      signInWithPopup(auth, provider).catch(err => showError(err.message));
  </script>
</body>
</html>
